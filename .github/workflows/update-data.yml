name: Update Market Data

on:
  schedule:
    # 台股開盤時段：09:00–13:30（UTC 01:00–05:30）每 15 分鐘
    - cron: "0,15,30,45 1,2,3,4 * * 1-5"
    - cron: "0,15,30 5 * * 1-5"
    # 美股開盤時段：22:30–05:00（UTC 14:30–21:00）每 15 分鐘
    - cron: "30,45 14 * * 1-5"
    - cron: "0,15,30,45 15,16,17,18,19,20 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/update_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: update market data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
